<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4361ee">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FreshWays">
  <meta name="application-name" content="FreshWays Pro">
  <meta name="description" content="Calculadora profesional FreshWays con modo Box">
  <title>FreshWays Pro</title>

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%234361ee'/%3E%3Ctext x='256' y='340' font-size='280' text-anchor='middle' fill='white' font-family='Arial'%3E%E2%89%88%3C/text%3E%3C/svg%3E">

  <style>
    :root {
      --primary: #4361ee;
      --bg: #ffffff;
      --display-bg: #f1f3f5;
      --box-bg: #ffeb3b;
      --text: #1a1a1a;
      --op: #f72585;
      --border: #e9ecef;
      --success: #2ec4b6;
      --nav-height: 60px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── PWA install banner ── */
    #install-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: var(--primary);
      color: white;
      padding: 8px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      gap: 8px;
    }
    #install-banner.visible { display: flex; }
    #install-banner button {
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 6px;
      padding: 4px 10px;
      font-weight: 800;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #install-banner .dismiss { border: none; opacity: 0.7; padding: 4px 6px; }

    /* ── offline badge ── */
    #offline-badge {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      z-index: 999;
      pointer-events: none;
    }
    #offline-badge.visible { display: block; }

    /* ── Toast de copiado ── */
    #copy-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }
    #copy-toast.show { opacity: 1; }

    .top-nav {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 5px;
      background: var(--display-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-nav button {
      border: none;
      background: white;
      border-radius: 8px;
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      color: #666;
      cursor: pointer;
    }

    .top-nav button.active { background: var(--primary); color: white; }

    .screen-header {
      background: var(--display-bg);
      padding: 5px;
      display: flex;
      flex-direction: column;
      min-height: 100px;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    /* ALTERNANCIA VISUAL EN MODO BOX */
    .screen-header.box-active { 
      background: var(--box-bg); 
      flex-direction: column-reverse;
    }

    .screen-header.box-active .mini-box-display {
      border-top: none; 
    }

    .screen-header.box-active .main-display-row {
      border-top: 1px solid rgba(0,0,0,0.08); 
      padding-top: 8px;
      margin-top: 5px;
    }

    .screen-header.box-active .mini-val { font-size: 1.7rem; }
    .screen-header.box-active .mini-item { font-size: 0.7rem; }
    .screen-header.box-active #preview { font-size: 1.2rem; }

    .main-display-row {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 15px;
      flex: 1;
    }

    /* Animación click elementos copiables */
    #display, #preview, .mini-val { 
      cursor: pointer; 
      transition: opacity 0.1s; 
    }
    #display:active, #preview:active, .mini-val:active { 
      opacity: 0.5; 
    }

    #display {
      font-size: 2.7rem; 
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
    }

    #preview { font-size: 1.8rem; color: var(--primary); font-weight: 800; }

    .mini-box-display {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 12px;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 8px;
      margin-top: 5px;
    }

    .mini-item { font-size: 0.75rem; font-weight: 800; color: #444; }
    
    .mini-val { font-size: 1.25rem; color: var(--primary); }
    .mini-val.res { color: var(--success); }
    .mini-val.rem { color: var(--op); }

    .keyboard {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      background: var(--border);
      gap: 1px;
    }

    .keyboard button {
      border: none;
      background: white;
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.1s ease, transform 0.1s ease;
    }

    .keyboard button:active, .keyboard button.flash {
      background-color: #e2e6ff !important;
      transform: scale(0.95);
    }

    .f-hint {
      font-size: 0.6rem;
      color: #aaa;
      margin-bottom: -4px;
      font-weight: normal;
      text-transform: uppercase;
    }

    .btn-op { color: var(--op); background: #fffafc !important; }
    .btn-clear { color: #ff4d4d; grid-column: span 2; }
    .btn-del { grid-column: span 2; }

    #sec-hist {
      display: none;
      flex-direction: column;
      height: calc(100dvh - var(--nav-height));
      background: white;
    }
    #sec-hist.active { display: flex; }

    #histContent {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
    }

    .hist-item { padding: 15px; border-bottom: 1px solid #eee; text-align: right; font-size: 1.1rem; }

    .btn-clear-hist {
      margin: 15px;
      padding: 18px;
      border: 2px solid #ff4d4d;
      color: #ff4d4d;
      background: white;
      border-radius: 12px;
      font-weight: 800;
      flex-shrink: 0;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }
    .btn-clear-hist:active {
      background: #ff4d4d;
      color: white;
    }
  </style>
</head>
<body>

  <div id="install-banner">
    <span>📲 Instalar FreshWays Pro como app</span>
    <div style="display:flex;gap:6px">
      <button id="install-btn">Instalar</button>
      <button class="dismiss" id="dismiss-btn">✕</button>
    </div>
  </div>

  <nav class="top-nav">
    <button id="tab-calc" class="active" onclick="switchTab('calc')">CALCU (F5)</button>
    <button id="tab-box" onclick="switchTab('box')">BOX CALC (F6)</button>
    <button id="tab-hist" onclick="switchTab('hist')">History (F7)</button>
  </nav>

  <main style="flex:1; display:flex; flex-direction:column; overflow: hidden;">
    <section id="sec-main" style="display:flex; flex-direction:column; height:100%;">
      <div id="screen" class="screen-header">
        <div class="main-display-row">
          <div id="display" onclick="copyToClipboard(calcVal)">0</div>
          <div id="preview" onclick="copyToClipboard(this.innerText)"></div>
        </div>
        <div class="mini-box-display">
          <div class="mini-item">UNIT: <span id="mini-total" class="mini-val" onclick="copyToClipboard(this.innerText)">0</span></div>
          <div class="mini-item">FULL: <span id="mini-full" class="mini-val res" onclick="copyToClipboard(this.innerText)">0</span></div>
          <div class="mini-item">REM: <span id="mini-rest" class="mini-val rem" onclick="copyToClipboard(this.innerText)">0</span> <span id="mini-formula" style="color:#777; font-size:0.6rem"></span></div>
        </div>
      </div>

      <div class="keyboard">
        <button data-key="Escape" class="btn-clear" onclick="cls()">
          <span class="f-hint">ESC / F9</span>Clean
        </button>
        <button data-key="Backspace" class="btn-del" onclick="del()">
          <span class="f-hint">DEL</span>⌫
        </button>

        <button data-key="7" onclick="press('7')">7</button>
        <button data-key="8" onclick="press('8')">8</button>
        <button data-key="9" onclick="press('9')">9</button>
        <button data-key="/" class="btn-op" onclick="press('/')">
          <span class="f-hint">F4</span>÷
        </button>

        <button data-key="4" onclick="press('4')">4</button>
        <button data-key="5" onclick="press('5')">5</button>
        <button data-key="6" onclick="press('6')">6</button>
        <button data-key="*" class="btn-op" onclick="press('*')">
          <span class="f-hint">F3</span>×
        </button>

        <button data-key="1" onclick="press('1')">1</button>
        <button data-key="2" onclick="press('2')">2</button>
        <button data-key="3" onclick="press('3')">3</button>
        <button data-key="-" class="btn-op" onclick="press('-')">
          <span class="f-hint">F2</span>−
        </button>

        <button data-key="0" style="grid-column: span 2" onclick="press('0')">0</button>
        <button data-key="." onclick="press('.')">.</button>
        <button data-key="+" class="btn-op" onclick="press('+')">
          <span class="f-hint">F1</span>+
        </button>
      </div>
    </section>

    <section id="sec-hist">
      <div id="histContent"></div>
      <button class="btn-clear-hist" onclick="clearHist()">CLEAR HISTORY</button>
    </section>
  </main>

  <div id="offline-badge">📶 Sin conexión · Modo offline</div>
  <div id="copy-toast">Copiado al portapapeles</div>

  <script>
    /* ═══════════════════════════════════════════════════════
       1. MANIFEST
    ════════════════════════════════════════════════════════ */
    (function injectManifest() {
      const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#4361ee"/><text x="256" y="340" font-size="280" text-anchor="middle" fill="white" font-family="Arial">≈</text></svg>`;
      const icon = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);

      const manifest = {
        name: 'FreshWays Pro',
        short_name: 'FreshWays',
        description: 'Calculadora profesional con modo Box',
        start_url: './',
        display: 'standalone',
        orientation: 'portrait',
        background_color: '#ffffff',
        theme_color: '#4361ee',
        lang: 'es',
        icons: [
          { src: icon, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
          { src: icon, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
        ]
      };

      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel  = 'manifest';
      link.href = url;
      document.head.appendChild(link);
    })();

    /* ═══════════════════════════════════════════════════════
       2. SERVICE WORKER
    ════════════════════════════════════════════════════════ */
    (function registerSW() {
      if (!('serviceWorker' in navigator)) return;

      const CACHE = 'freshways-v1';
      const swCode = `
        const CACHE = '${CACHE}';

        self.addEventListener('install', e => {
          self.skipWaiting();
          e.waitUntil(
            caches.open(CACHE).then(c => c.addAll([self.location.href]))
          );
        });

        self.addEventListener('activate', e => {
          e.waitUntil(
            caches.keys().then(keys =>
              Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
            ).then(() => self.clients.claim())
          );
        });

        self.addEventListener('fetch', e => {
          if (e.request.method !== 'GET') return;
          e.respondWith(
            caches.match(e.request).then(cached => {
              const network = fetch(e.request)
                .then(res => {
                  if (res && res.status === 200) {
                    const clone = res.clone();
                    caches.open(CACHE).then(c => c.put(e.request, clone));
                  }
                  return res;
                })
                .catch(() => cached);
              return cached || network;
            })
          );
        });
      `;

      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swURL = URL.createObjectURL(blob);

      navigator.serviceWorker.register(swURL, { scope: './' })
        .then(reg => console.log('[SW] Registrado:', reg.scope))
        .catch(err => console.warn('[SW] Error:', err));
    })();

    /* ═══════════════════════════════════════════════════════
       3. PWA INSTALL PROMPT
    ════════════════════════════════════════════════════════ */
    let deferredPrompt = null;
    const banner     = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const dismissBtn = document.getElementById('dismiss-btn');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      banner.classList.add('visible');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      banner.classList.remove('visible');
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Install outcome:', outcome);
      deferredPrompt = null;
    });

    dismissBtn.addEventListener('click', () => {
      banner.classList.remove('visible');
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      banner.classList.remove('visible');
      deferredPrompt = null;
    });

    /* ═══════════════════════════════════════════════════════
       4. ONLINE / OFFLINE INDICATOR
    ════════════════════════════════════════════════════════ */
    const offlineBadge = document.getElementById('offline-badge');
    function updateOnlineStatus() {
      offlineBadge.classList.toggle('visible', !navigator.onLine);
    }
    window.addEventListener('online',  updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    /* ═══════════════════════════════════════════════════════
       5. LÓGICA CALCULADORA Y NUEVAS FUNCIONES
    ════════════════════════════════════════════════════════ */
    let mode = 'calc';
    let calcVal = "0";
    let boxVal  = "0";
    let history = JSON.parse(localStorage.getItem('fw_hist_v9')) || [];

    const display = document.getElementById('display');
    const preview = document.getElementById('preview');
    const screen  = document.getElementById('screen');

    // -- Función de Portapapeles --
    function copyToClipboard(text) {
      if (!text || text === "") return;
      
      // Limpiamos el texto por si viene con el signo igual del preview ("= 5")
      const cleanText = text.toString().replace('= ', '');
      
      navigator.clipboard.writeText(cleanText).then(() => {
        const toast = document.getElementById('copy-toast');
        toast.classList.add('show');
        if (navigator.vibrate) navigator.vibrate(20); // Vibración extra al copiar
        setTimeout(() => toast.classList.remove('show'), 2000);
      }).catch(err => console.error('Error al copiar:', err));
    }

    // -- Función de Vibración Háptica --
    function haptic() {
      if (navigator.vibrate) navigator.vibrate(15);
    }

    function switchTab(t) {
      haptic();
      mode = t;
      document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${t}`).classList.add('active');
      document.getElementById('sec-main').style.display = (t === 'hist') ? 'none' : 'flex';
      document.getElementById('sec-hist').classList.toggle('active', t === 'hist');
      screen.classList.toggle('box-active', t === 'box');
      display.innerText = calcVal;
      if (t === 'hist') renderHist();
      adjustFontSize();
    }

    function press(v) {
      haptic();
      
      if (mode === 'box') {
        if (!isNaN(v) || v === '.') {
          if (boxVal === "0" && v !== ".") boxVal = v;
          else boxVal += v;
          updateLogic();
        }
      } else {
        const ops = ['+', '-', '*', '/'];
        
        // Bloqueo y reemplazo de operadores seguidos
        if (ops.includes(v)) {
          const lastChar = calcVal.slice(-1);
          if (ops.includes(lastChar)) {
            calcVal = calcVal.slice(0, -1) + v; // Reemplaza el anterior
          } else {
            calcVal += v; // Lo añade normal
          }
        } else {
          if (calcVal === '0' && !isNaN(v)) calcVal = v;
          else calcVal += v;
        }

        display.innerText = calcVal;
        updateLogic();
      }
      adjustFontSize();
    }

    function del() {
      haptic();
      if (mode === 'box') boxVal = boxVal.slice(0, -1) || "0";
      else { calcVal = calcVal.slice(0, -1) || "0"; display.innerText = calcVal; }
      updateLogic();
      adjustFontSize();
    }

    function cls() {
      haptic();
      if (mode === 'box') boxVal = "0";
      else { calcVal = "0"; display.innerText = "0"; preview.innerText = ""; }
      updateLogic();
    }

    function updateLogic() {
      let divisor = 0;
      try {
        let res = eval(calcVal);
        res = Math.round(res * 10) / 10;
        divisor = res;
        preview.innerText = (res !== undefined && res.toString() !== calcVal) ? '= ' + res : '';
      } catch { preview.innerText = ''; }

      const total = parseFloat(boxVal);
      document.getElementById('mini-total').innerText = boxVal;

      if (total > 0 && divisor > 0) {
        const full = Math.floor(total / divisor);
        const rest = Math.round((total % divisor) * 100) / 100;
        document.getElementById('mini-full').innerText = full;
        document.getElementById('mini-rest').innerText = rest;

        let formula = "";
        if (calcVal.includes('*')) {
          const parts = calcVal.split('*');
          const first = parseFloat(parts[0]);
          if (first > 0) formula = `(${first}x${Math.floor(rest / first)})+${Math.round((rest % first) * 100) / 100}`;
        }
        document.getElementById('mini-formula').innerText = formula;
        saveHist(mode === 'box' ? `Box: ${total} ÷ (${calcVal}) = ${full} [R: ${rest}]` : `${calcVal} = ${divisor}`);
      } else {
        document.getElementById('mini-full').innerText = "0";
        document.getElementById('mini-rest').innerText = "0";
        document.getElementById('mini-formula').innerText = "";
      }
      localStorage.setItem('fw_calc_v9', calcVal);
    }

    function saveHist(entry) {
      if (entry.length < 3) return;
      if (history[0] && entry.split('=')[0] === history[0].split('=')[0]) history[0] = entry;
      else history.unshift(entry);
      if (history.length > 50) history.pop();
      localStorage.setItem('fw_hist_v9', JSON.stringify(history));
    }

    function renderHist() {
      const container = document.getElementById('histContent');
      container.innerHTML = history.length
        ? history.map(h => `<div class="hist-item">${h}</div>`).join('')
        : '<p style="text-align:center;color:#999;margin-top:40px;">No history</p>';
      container.scrollTop = 0;
    }

    function clearHist() {
      haptic();
      history = []; 
      localStorage.removeItem('fw_hist_v9'); 
      renderHist(); 
    }

    function adjustFontSize() {
      if (mode === 'box') {
        display.style.fontSize = '1.5rem';
      } else {
        display.style.fontSize = '2.7rem';
        setTimeout(() => {
          let size = 2.7;
          while (display.scrollWidth > display.clientWidth && size > 1.2) {
            size -= 0.2;
            display.style.fontSize = size + "rem";
          }
        }, 0);
      }
    }

    /* ── Teclado físico ── */
    window.addEventListener('keydown', (e) => {
      const key = e.key;
      
      let targetKey = key;
      if (key === 'Delete') targetKey = 'Backspace';
      if (key === 'F9') targetKey = 'Escape';
      
      const btn = document.querySelector(`.keyboard button[data-key="${targetKey}"]`);
      if (btn) {
        btn.classList.add('flash');
        setTimeout(() => btn.classList.remove('flash'), 100);
      }

      if (!isNaN(key) || key === '.') press(key);
      else if (['+', '-', '*', '/'].includes(key)) press(key);
      else if (key === 'Backspace' || key === 'Delete') { e.preventDefault(); del(); }
      else if (key === 'Escape' || key === 'F9') { e.preventDefault(); cls(); } 
      else if (key === 'F5') { e.preventDefault(); switchTab('calc'); }
      else if (key === 'F6') { e.preventDefault(); switchTab('box'); }
      else if (key === 'F7') { e.preventDefault(); switchTab('hist'); }
      else if (key === 'F1') { e.preventDefault(); press('+'); }
      else if (key === 'F2') { e.preventDefault(); press('-'); }
      else if (key === 'F3') { e.preventDefault(); press('*'); }
      else if (key === 'F4') { e.preventDefault(); press('/'); }
    });

    window.onload = () => {
      calcVal = localStorage.getItem('fw_calc_v9') || "0";
      display.innerText = calcVal;
      updateLogic();
    };
  </script>
</body>
</html>
