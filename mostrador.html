<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mostrador Pro v4</title>
<style>
  :root {
    --bg: #000000;
    --fg: #FFE500;
    --speed: 15s;
    --fsize: 30vmin;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    width: 100%; height: 100dvh;
    overflow: hidden; background: #0a0a0a; color: #fff;
    font-family: 'Impact', 'Arial Black', sans-serif;
  }

  /* ══ PANEL EDITOR ══ */
  #panel {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    background: #0a0a0a; z-index: 10; padding: var(--safe-top) 0 var(--safe-bot) 0;
  }
  #panel.hidden { display: none; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 20px; border-bottom: 1px solid #1e1e1e;
  }
  #btn-launch {
    background: var(--fg); color: #000; border: none; font-weight: 900;
    padding: 10px 20px; border-radius: 8px; text-transform: uppercase; cursor: pointer;
  }

  .editor-area { flex: 1; display: flex; flex-direction: column; padding: 15px; }
  #msg {
    flex: 1; background: #111; border: 2px solid #333; border-radius: 10px;
    color: #fff; font-size: 20px; padding: 15px; resize: none; outline: none;
  }

  .controls { padding: 15px; border-top: 1px solid #1e1e1e; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 15px; }
  .label { font-size: 11px; text-transform: uppercase; color: #888; width: 60px; }
  input[type=range] { flex: 1; }
  .seg-btn { display: flex; flex: 1; background: #111; border-radius: 8px; overflow: hidden; }
  .seg-btn button { flex: 1; border: none; background: transparent; color: #666; padding: 12px; font-family: inherit; cursor: pointer; }
  .seg-btn button.active { background: #333; color: #fff; }

  /* ══ DISPLAY ══ */
  #display {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg); color: var(--fg);
    display: none; justify-content: center; align-items: center;
  }
  #display.active { display: flex; }

  #display-content {
    position: relative; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
  }

  @media screen and (orientation: portrait) {
    #display-content { width: 100dvh; height: 100dvw; transform: rotate(90deg); }
  }

  .track { width: 100%; height: 100%; display: none; overflow: hidden; }
  .track.active { display: flex; }

  .inner { display: flex; font-size: var(--fsize); line-height: 1.0; text-transform: uppercase; }

  /* MODO VERTICAL: CORRECCIÓN DE CORTE Y GUIONES */
  #v-track { justify-content: center; align-items: flex-start; }
  #v-inner { 
    flex-direction: column; 
    white-space: normal; /* Permite bajar a la siguiente línea */
    width: 100%;
    text-align: center;
    /* Lógica de guiones y rotura de palabras */
    overflow-wrap: break-word;
    word-wrap: break-word;
    word-break: break-word;
    hyphens: auto; 
    -webkit-hyphens: auto;
  }
  #v-inner div { width: 100%; padding: 0 5%; }
  #v-inner.animate { animation: scrollUp var(--speed) linear infinite; }

  /* MODO TICKER */
  #h-track { align-items: center; }
  #h-inner { white-space: nowrap; flex-direction: row; }
  #h-inner.animate { animation: scrollLeft var(--speed) linear infinite; }

  /* BARRA DE PROGRESO (Loader universal) */
  #progress-container {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.05);
    z-index: 1000;
  }
  #progress-fill { 
    height: 100%; width: 0%; 
    background: var(--fg); 
    box-shadow: 0 0 10px var(--fg);
  }
  
  /* Animación del loader sincronizada */
  #display.active #progress-fill {
    animation: load var(--speed) linear infinite;
  }

  @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
  @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

  /* HUD */
  #hud {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; opacity: 0; transition: 0.3s; z-index: 2000;
  }
  #display.show-hud #hud { opacity: 1; }
  .hud-btn {
    background: rgba(0,0,0,0.8); border: 1px solid #444; color: #fff;
    padding: 12px 24px; border-radius: 30px; font-family: inherit; font-weight: bold; cursor: pointer;
  }
</style>
</head>
<body lang="es"> <div id="panel">
  <header>
    <div style="font-weight:900; color:var(--fg)">MOSTRADOR PRO</div>
    <button id="btn-launch">MOSTRAR</button>
  </header>
  <div class="editor-area">
    <textarea id="msg" placeholder="Escribe aquí...">ESCRIBE UN TEXTO MUY LARGO PARA PROBAR LOS GUIONES AUTOMÁTICOS</textarea>
  </div>
  <div class="controls">
    <div class="row">
      <span class="label">Color</span>
      <input type="color" id="bg-color" value="#000000" style="flex:1; height:45px; border:none;">
      <input type="color" id="fg-color" value="#FFE500" style="flex:1; height:45px; border:none;">
    </div>
    <div class="row">
      <span class="label">Modo</span>
      <div class="seg-btn" id="mode-seg">
        <button class="active" data-m="v">VERTICAL</button>
        <button data-m="h">TICKER</button>
      </div>
    </div>
    <div class="row">
      <span class="label">Velocidad</span>
      <input type="range" id="speed-r" min="1" max="25" value="10">
    </div>
    <div class="row">
      <span class="label">Tamaño</span>
      <input type="range" id="size-r" min="10" max="120" value="40">
    </div>
  </div>
</div>

<div id="display">
  <div id="display-content">
    <div class="track" id="v-track"><div class="inner" id="v-inner"></div></div>
    <div class="track" id="h-track"><div class="inner" id="h-inner"></div></div>
    
    <div id="progress-container">
      <div id="progress-fill"></div>
    </div>

    <div id="hud">
      <button class="hud-btn" onclick="togglePause()">PAUSA</button>
      <button class="hud-btn" onclick="stopDisplay()" style="color:#ff4444">SALIR</button>
    </div>
  </div>
</div>

<script>
  let state = { mode: 'v', paused: false };

  // Velocidad: de 80 segundos (1) a 1.5 segundos (25)
  function updateSpeed(val) {
    let seconds = 82 - (val * 3.2); 
    if(seconds < 1.5) seconds = 1.5;
    document.documentElement.style.setProperty('--speed', seconds + 's');
  }

  document.getElementById('bg-color').oninput = e => document.documentElement.style.setProperty('--bg', e.target.value);
  document.getElementById('fg-color').oninput = e => {
    document.documentElement.style.setProperty('--fg', e.target.value);
    document.getElementById('btn-launch').style.background = e.target.value;
  };
  
  document.getElementById('speed-r').oninput = e => updateSpeed(e.target.value);
  document.getElementById('size-r').oninput = e => document.documentElement.style.setProperty('--fsize', e.target.value + 'vmin');

  document.querySelectorAll('#mode-seg button').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('#mode-seg button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      state.mode = b.dataset.m;
    };
  });

  function launchDisplay() {
    const text = document.getElementById('msg').value.trim();
    if(!text) return;

    const vInner = document.getElementById('v-inner');
    const hInner = document.getElementById('h-inner');
    
    vInner.innerHTML = hInner.innerHTML = '';
    vInner.classList.remove('animate');
    hInner.classList.remove('animate');
    document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));

    if(state.mode === 'v') {
      const content = `<div>${text.replace(/\n/g, '<br>')}</div>`;
      vInner.innerHTML = content + content;
      document.getElementById('v-track').classList.add('active');
    } else {
      const content = `<span>${text.replace(/\n/g, ' ')} &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; </span>`;
      hInner.innerHTML = content + content;
      document.getElementById('h-track').classList.add('active');
    }

    document.getElementById('panel').classList.add('hidden');
    document.getElementById('display').classList.add('active');
    
    // Forzar reinicio de animación de la barra
    const fill = document.getElementById('progress-fill');
    fill.style.animation = 'none';
    fill.offsetHeight; // trigger reflow
    fill.style.animation = null;

    setTimeout(() => {
        vInner.classList.add('animate');
        hInner.classList.add('animate');
    }, 50);

    try {
      if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
      if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
    } catch(e) {}
  }

  function stopDisplay() {
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('display').classList.remove('active');
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
  }

  function togglePause() {
    state.paused = !state.paused;
    const elements = [
      document.getElementById('v-inner'), 
      document.getElementById('h-inner'), 
      document.getElementById('progress-fill')
    ];
    elements.forEach(el => el.style.animationPlayState = state.paused ? 'paused' : 'running');
  }

  document.getElementById('btn-launch').onclick = launchDisplay;
  
  document.getElementById('display').onclick = (e) => {
    if(e.target.tagName === 'BUTTON') return;
    document.getElementById('display').classList.toggle('show-hud');
  };

  updateSpeed(10);
</script>
</body>
</html>
